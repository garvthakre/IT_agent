<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IT Admin Panel{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: #f5f5f5;
            color: #222;
        }

        /* ── Nav ── */
        nav {
            background: #1a1a2e;
            color: white;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 32px;
            height: 48px;
        }
        nav .brand {
            font-size: 16px;
            font-weight: bold;
            color: #00e5ff;
            text-decoration: none;
        }
        nav a {
            color: #ccc;
            text-decoration: none;
            font-size: 13px;
        }
        nav a:hover { color: white; }

        /* ── Layout ── */
        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }

        /* ── Page heading ── */
        h1 { font-size: 22px; margin-bottom: 16px; color: #1a1a2e; }
        h2 { font-size: 16px; margin-bottom: 12px; color: #333; }

        /* ── Cards ── */
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* ── Flash messages ── */
        .flash {
            padding: 10px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .flash.success { background: #e6f9ee; border: 1px solid #4caf50; color: #2e7d32; }
        .flash.error   { background: #fdecea; border: 1px solid #f44336; color: #b71c1c; }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
        }
        .btn-primary  { background: #1a1a2e; color: white; }
        .btn-danger   { background: #d32f2f; color: white; }
        .btn-warning  { background: #f57c00; color: white; }
        .btn-success  { background: #388e3c; color: white; }
        .btn-secondary{ background: #757575; color: white; }
        .btn:hover    { opacity: 0.88; }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1a1a2e; color: white; padding: 9px 12px; text-align: left; }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background: #fafafa; }

        /* ── Status badges ── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-active   { background: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .badge-disabled { background: #fdecea; color: #b71c1c; border: 1px solid #f44336; }
        .badge-admin    { background: #e3f2fd; color: #1565c0; border: 1px solid #2196f3; }
        .badge-employee { background: #f3e5f5; color: #6a1b9a; border: 1px solid #9c27b0; }
        .badge-viewer   { background: #fff8e1; color: #f57f17; border: 1px solid #ffc107; }

        /* ── Form ── */
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        input[type="text"], input[type="email"], select {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }
        input:focus, select:focus { outline: 2px solid #1a1a2e; border-color: #1a1a2e; }

        /* ── Search ── */
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .search-row input { max-width: 300px; }

        /* ── Stat boxes ── */
        .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 16px 24px;
            min-width: 140px;
            text-align: center;
        }
        .stat-box .stat-num { font-size: 32px; font-weight: bold; color: #1a1a2e; }
        .stat-box .stat-label { font-size: 12px; color: #666; margin-top: 4px; }

        /* ── Confirm page ── */
        .confirm-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 32px;
            max-width: 500px;
            margin: 40px auto;
            text-align: center;
        }
        .confirm-box .big-check { font-size: 48px; margin-bottom: 16px; }
        .confirm-box h2 { font-size: 20px; margin-bottom: 12px; }
        .confirm-box p  { color: #444; margin-bottom: 8px; font-size: 14px; }
        .confirm-box .password-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px 16px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            margin: 16px 0;
            color: #1a1a2e;
        }

        /* ── Detail table ── */
        .detail-table td:first-child { font-weight: bold; color: #555; width: 140px; }

        /* ── Action buttons in table ── */
        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="brand">IT Admin Panel</a>
    <a href="/">Dashboard</a>
    <a href="/users">Users</a>
    <a href="/create-user">Create User</a>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
